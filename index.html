<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f4f4f5;
    --surface: #ffffff;
    --border: #e4e4e7;
    --text: #18181b;
    --text-muted: #71717a;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
  }

  [data-theme="dark"] {
    --bg: #09090b;
    --surface: #18181b;
    --border: #27272a;
    --text: #f4f4f5;
    --text-muted: #a1a1aa;
    --primary: #3b82f6;
    --primary-hover: #4f46e5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* --- SIDEBAR CONTROLS (THE STEALTH PANEL) --- */
  .sidebar {
    width: 380px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px;
    z-index: 10;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .sidebar.hidden {
    transform: translateX(-100%);
    position: absolute;
    height: 100%;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
  
  .controls-top { display: flex; gap: 8px; }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    transition: all 0.2s;
  }

  .icon-btn {
    width: 36px; height: 36px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .icon-btn:hover { background: var(--border); }

  .input-group { display: flex; flex-direction: column; flex: 1; }
  
  label { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
  
  textarea {
    flex: 1;
    resize: none;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    line-height: 1.5;
    outline: none;
    margin-bottom: 16px;
  }
  textarea:focus { border-color: var(--primary); }

  .settings {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
  }
  
  input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

  .spin-btn {
    background: var(--primary);
    color: white;
    padding: 18px;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
  }
  .spin-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* --- MAIN STAGE (THE WHEEL) --- */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .show-sidebar-btn {
    position: absolute;
    top: 24px;
    left: 24px;
    padding: 10px 16px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 5;
  }
  .sidebar.hidden ~ .stage .show-sidebar-btn {
    opacity: 1;
    pointer-events: auto;
  }

  .wheel-container {
    position: relative;
    width: 700px;
    height: 700px;
    filter: drop-shadow(0 10px 40px rgba(0,0,0,0.2));
  }

  canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }

  /* The Red Flipper / Pointer */
  .pointer {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 60px;
    z-index: 2;
  }
  
  .pointer svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
    transform-origin: top center;
    transition: transform 0.1s;
  }
  
  .pointer.ticking svg {
    transform: rotate(25deg);
  }

  /* Center Hub */
  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 60px;
    background: var(--surface);
    border: 6px solid var(--border);
    border-radius: 50%;
    z-index: 2;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  /* Confetti Canvas */
  #confetti {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  /* Winner Popup */
  .winner-popup {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    color: var(--text);
    padding: 20px 40px;
    border-radius: 12px;
    border: 2px solid var(--primary);
    font-size: 32px;
    font-weight: 900;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 101;
    pointer-events: none;
  }
  .winner-popup.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="header">
    <h1>Spin<span style="color: var(--primary)">It</span></h1>
    <div class="controls-top">
      <button class="icon-btn" id="themeBtn" title="Toggle Theme">☀️</button>
      <button class="icon-btn" id="hideSidebarBtn" title="Hide Setup for Stream">👁️</button>
    </div>
  </div>

  <div class="input-group">
    <label>Wheel Entries (One per line)</label>
    <textarea id="itemsInput" spellcheck="false">Playing Random Duos
Worst Weapon Challenge
Q&A from Chat
Viewers Control My Game
No Healing Allowed
Drop Random Item
Do 10 Pushups
Reviewing Subs Videos</textarea>
  </div>

  <label class="settings">
    <input type="checkbox" id="eliminateCb">
    Remove winner after spinning
  </label>

  <button class="spin-btn" id="spinBtn">Spin Wheel</button>
</div>

<div class="stage">
  <button class="show-sidebar-btn" id="showSidebarBtn">⚙️ Show Setup</button>
  
  <div class="wheel-container">
    <div class="pointer" id="pointer">
      <svg viewBox="0 0 50 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M25 60L5 15C1 7 7 0 15 0H35C43 0 49 7 45 15L25 60Z" fill="#ef4444"/>
        <path d="M25 50L11 15C9 10 12 5 18 5H32C38 5 41 10 39 15L25 50Z" fill="#dc2626"/>
      </svg>
    </div>
    <canvas id="wheel"></canvas>
    <div class="hub"></div>
  </div>

  <div class="winner-popup" id="winnerPopup">WINNER!</div>
  <canvas id="confetti"></canvas>
</div>

<script>
// --- VIBRANT YOUTUBE-FRIENDLY COLOR PALETTE ---
const colors = [
  "#ef4444", "#f97316", "#eab308", "#22c55e", 
  "#06b6d4", "#3b82f6", "#8b5cf6", "#ec4899"
];

// --- APP STATE ---
let items = [];
let isSpinning = false;
let currentRotation = 0; // in radians
let angularVelocity = 0;
let lastTickSlice = -1;

// --- DOM ELEMENTS ---
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const itemsInput = document.getElementById('itemsInput');
const spinBtn = document.getElementById('spinBtn');
const pointer = document.getElementById('pointer');
const eliminateCb = document.getElementById('eliminateCb');
const winnerPopup = document.getElementById('winnerPopup');
const sidebar = document.getElementById('sidebar');

// --- WEB AUDIO API (NO EXTERNAL FILES) ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function playTick() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  // Create a sharp, mechanical "clack" sound
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
  
  gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.05);

  // Visually flick the pointer
  pointer.classList.add('ticking');
  setTimeout(() => pointer.classList.remove('ticking'), 50);
}

// --- SETUP CANVAS FOR HIGH-RES SCREENS ---
function resizeCanvas() {
  const size = 700;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  ctx.scale(dpr, dpr);
  drawWheel();
}
window.addEventListener('resize', resizeCanvas);

// --- UPDATE ITEMS LIST ---
function updateItems() {
  items = itemsInput.value.split('\n').map(i => i.trim()).filter(i => i !== '');
  if (items.length === 0) items = ["Add options"];
  localStorage.setItem('wheelItems', itemsInput.value);
  drawWheel();
}

itemsInput.addEventListener('input', () => {
  if (!isSpinning) updateItems();
});

// Load from memory
if (localStorage.getItem('wheelItems')) {
  itemsInput.value = localStorage.getItem('wheelItems');
}
updateItems();
resizeCanvas();

// --- DRAWING THE WHEEL ---
function drawWheel() {
  const cx = 350;
  const cy = 350;
  const radius = 350;
  const sliceAngle = (2 * Math.PI) / items.length;

  ctx.clearRect(0, 0, 700, 700);
  
  // We rotate the entire context to handle the spin
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(currentRotation);

  for (let i = 0; i < items.length; i++) {
    const angle = i * sliceAngle;
    
    // Draw Slice
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, radius, angle, angle + sliceAngle);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    
    // Draw Divider Lines
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(0,0,0,0.15)";
    ctx.stroke();

    // Draw Pegs (Dots on the edge)
    const pegX = Math.cos(angle) * (radius - 12);
    const pegY = Math.sin(angle) * (radius - 12);
    ctx.beginPath();
    ctx.arc(pegX, pegY, 4, 0, 2 * Math.PI);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(0,0,0,0.2)";
    ctx.stroke();

    // Draw Text
    ctx.save();
    // Rotate to the center of the slice
    ctx.rotate(angle + sliceAngle / 2);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 24px 'DM Sans', sans-serif";
    
    // Shadow for readability
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;

    let text = items[i];
    // Shorten text if it's crazy long
    if(text.length > 22) text = text.substring(0, 20) + "...";
    ctx.fillText(text, radius - 30, 0);
    ctx.restore();
  }
  ctx.restore();
}

// --- SPIN PHYSICS ---
function easeOut(t, b, c, d) {
  t /= d;
  t--;
  return c * (t * t * t + 1) + b;
}

let spinStart = 0;
let spinDuration = 0;
let targetRotation = 0;
let startRotation = 0;

function animateSpin(timestamp) {
  if (!spinStart) spinStart = timestamp;
  const elapsed = timestamp - spinStart;

  if (elapsed < spinDuration) {
    const prevRotation = currentRotation;
    currentRotation = easeOut(elapsed, startRotation, targetRotation - startRotation, spinDuration);
    
    // Calculate if we passed a peg to play the tick sound
    // The pointer is at top (-90 degrees / -PI/2)
    const sliceAngle = (2 * Math.PI) / items.length;
    // Offset by PI/2 because wheel starts at 3 o'clock, pointer is at 12 o'clock
    const normalizedRot = (currentRotation + Math.PI / 2) % (2 * Math.PI); 
    const currentSlice = Math.floor((2 * Math.PI - normalizedRot) / sliceAngle) % items.length;

    if (currentSlice !== lastTickSlice) {
      if (lastTickSlice !== -1) playTick(); // Don't tick on exact start
      lastTickSlice = currentSlice;
    }

    drawWheel();
    requestAnimationFrame(animateSpin);
  } else {
    // Finished Spinning
    currentRotation = targetRotation % (2 * Math.PI);
    drawWheel();
    isSpinning = false;
    spinBtn.disabled = false;
    spinBtn.innerText = "SPIN WHEEL";
    
    // Calculate Winner
    const sliceAngle = (2 * Math.PI) / items.length;
    const normalizedRot = (currentRotation + Math.PI / 2) % (2 * Math.PI);
    // Because wheel spins clockwise, the index goes backwards
    const winningIndex = Math.floor((2 * Math.PI - normalizedRot) / sliceAngle) % items.length;
    const winner = items[winningIndex];

    // Show Popup & Confetti
    winnerPopup.innerText = winner;
    winnerPopup.classList.add('show');
    fireConfetti();

    // Auto-remove feature
    if (eliminateCb.checked && items.length > 1) {
      setTimeout(() => {
        items.splice(winningIndex, 1);
        itemsInput.value = items.join('\n');
        localStorage.setItem('wheelItems', itemsInput.value);
        updateItems();
      }, 3000); // Wait 3 seconds before removing
    }
  }
}

spinBtn.addEventListener('click', () => {
  if (isSpinning || items.length <= 1) return;
  
  isSpinning = true;
  spinBtn.disabled = true;
  spinBtn.innerText = "SPINNING...";
  winnerPopup.classList.remove('show');
  
  // Initialize Audio Context on first user interaction
  if (!audioCtx) audioCtx = new AudioContext();

  // Give it a random duration (5-7 seconds) and lots of random rotations
  spinDuration = 5000 + Math.random() * 2000; 
  startRotation = currentRotation;
  const spins = 10 + Math.random() * 10; 
  targetRotation = currentRotation + (spins * 2 * Math.PI);
  
  spinStart = null;
  lastTickSlice = -1;
  requestAnimationFrame(animateSpin);
});

// --- CONFETTI SYSTEM (Built-in) ---
const cCanvas = document.getElementById('confetti');
const cCtx = cCanvas.getContext('2d');
let particles = [];
let confettiActive = false;

function fireConfetti() {
  cCanvas.width = window.innerWidth;
  cCanvas.height = window.innerHeight;
  particles = [];
  
  for(let i=0; i<100; i++) {
    particles.push({
      x: window.innerWidth / 2,
      y: window.innerHeight / 2 + 100, // Starts near the bottom center of wheel
      vx: (Math.random() - 0.5) * 20,
      vy: (Math.random() - 1) * 20 - 5,
      size: Math.random() * 10 + 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10
    });
  }
  
  if(!confettiActive) {
    confettiActive = true;
    animateConfetti();
  }
}

function animateConfetti() {
  cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
  let active = false;
  
  particles.forEach(p => {
    if(p.y < cCanvas.height) {
      active = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.5; // gravity
      p.rot += p.rotSpeed;
      
      cCtx.save();
      cCtx.translate(p.x, p.y);
      cCtx.rotate(p.rot * Math.PI / 180);
      cCtx.fillStyle = p.color;
      cCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      cCtx.restore();
    }
  });
  
  if(active) requestAnimationFrame(animateConfetti);
  else confettiActive = false;
}

// --- UI CONTROLS ---
const themeBtn = document.getElementById('themeBtn');
themeBtn.addEventListener('click', () => {
  const root = document.documentElement;
  const isDark = root.getAttribute('data-theme') === 'dark';
  root.setAttribute('data-theme', isDark ? 'light' : 'dark');
  themeBtn.innerText = isDark ? '🌙' : '☀️';
});

document.getElementById('hideSidebarBtn').addEventListener('click', () => {
  sidebar.classList.add('hidden');
});

document.getElementById('showSidebarBtn').addEventListener('click', () => {
  sidebar.classList.remove('hidden');
});

// Hide popup when clicking anywhere
document.addEventListener('click', (e) => {
  if(e.target.id !== 'spinBtn') winnerPopup.classList.remove('show');
});

</script>
</body>
</html>
